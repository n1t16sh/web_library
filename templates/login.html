<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background: linear-gradient(135deg,#4e54c8,#8f94fb);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            font-family:Arial, Helvetica, sans-serif;
        }

        .login-card{
            width:400px;
            border:none;
            border-radius:20px;
            box-shadow:0 15px 35px rgba(0,0,0,.25);
        }

        .card-body{
            padding:40px;
        }

        h2{
            font-weight:bold;
            margin-bottom:30px;
        }

        .form-control{
            height:48px;
            border-radius:10px;
        }

        .btn-primary{
            height:48px;
            border-radius:10px;
            font-weight:bold;
            transition:.3s;
        }

        .btn-primary:hover{
            transform:translateY(-2px);
        }

        .logo{
            font-size:50px;
            text-align:center;
            margin-bottom:10px;
        }
    </style>

</head>
<body>

<div class="card login-card">

    <div class="card-body">

        <div class="logo">
            🔐
        </div>

        <h2 class="text-center">Welcome Back</h2>

        <form action="/login" method="POST">

            <div class="mb-3">
                <label class="form-label">
                    Email Address
                </label>

                <input
                    type="email"
                    class="form-control"
                    name="email_input"
                    placeholder="Enter your email"
                    required
                >

                {% if message %}
                    <small class="text-danger">
                        {{message}}
                    </small>
                {% else %}
                    <small class="text-muted">
                        We'll never share your email.
                    </small>
                {% endif %}
            </div>

            <div class="mb-4">

                <label class="form-label">
                    Password
                </label>

                <input
                    type="password"
                    class="form-control"
                    name="pass"
                    placeholder="Enter your password"
                    required
                >

            </div>

            <button class="btn btn-primary w-100">
                Login
            </button>
            <div class="text-center mt-3">
                <a href="/register" class="btn btn-outline-secondary w-100">
                    Create New Account
                </a>
            </div>

        </form>

    </div>

</div>

</body>
</html>
