<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background: linear-gradient(135deg,#4e54c8,#8f94fb);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            font-family:Arial, Helvetica, sans-serif;
        }

        .login-card{
            width:400px;
            border:none;
            border-radius:20px;
            box-shadow:0 15px 35px rgba(0,0,0,.25);
        }

        .card-body{
            padding:40px;
        }

        h2{
            font-weight:bold;
            margin-bottom:30px;
        }

        .form-control{
            height:48px;
            border-radius:10px;
        }

        .btn-primary{
            height:48px;
            border-radius:10px;
            font-weight:bold;
            transition:.3s;
        }

        .btn-primary:hover{
            transform:translateY(-2px);
        }

        .logo{
            font-size:50px;
            text-align:center;
            margin-bottom:10px;
        }
        .btn-success{
            height:48px;
            border-radius:10px;
            font-weight:bold;
            transition:.3s;
        }

        .btn-success:hover{
            transform:translateY(-2px);
        }
    </style>

</head>
<body>
    <div class="card login-card">

    <div class="card-body">

        <div class="logo">
            📚
        </div>

        <h2 class="text-center">Create Account</h2>
        <p class="text-center text-muted mb-4">
            Register to access the Library Management System
        </p>

        <form action="/register" method="POST">

            <div class="mb-3">
                <label class="form-label">
                    Full Name
                </label>

                <input
                    type="text"
                    class="form-control"
                    name="name"
                    placeholder="Enter your full name"
                    required
                >
            </div>

            <div class="mb-3">
                <label class="form-label">
                    Email Address
                </label>

                <input
                    type="email"
                    class="form-control"
                    name="email_input"
                    placeholder="Enter your email"
                    required
                >

                {% if message %}
                    <small class="text-danger">
                        {{message}}
                    </small>
                {% else %}
                    <small class="text-muted">
                        We'll never share your email.
                    </small>
                {% endif %}
            </div>

            <div class="mb-4">
                <label class="form-label">
                    Password
                </label>

                <input
                    type="password"
                    class="form-control"
                    name="pass"
                    placeholder="Create a password"
                    required
                >
            </div>

            <button type="submit" class="btn btn-success w-100">
                Create Account
            </button>

        </form>

        <hr>

        <p class="text-center mb-0">
            Already have an account?
            <a href="/login" class="text-decoration-none fw-bold">
                Login
            </a>
        </p>

    </div>

</div>
</body>
</html>
